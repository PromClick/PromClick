{{- $clickhouse := default dict .Values.secretRefs.clickhouse -}}
{{- if not $clickhouse.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "promclick.clickhouseSecretName" . }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  user: {{ default "" $clickhouse.user | quote }}
  password: {{ default "" $clickhouse.password | quote }}
{{- end }}
