{{- range $key, $dep := .Values.deployments }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ default $key $dep.name }}
  labels:
    app.kubernetes.io/name: {{ default $key $dep.name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: {{ $key }}
spec:
  replicas: {{ default 1 $dep.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/component: {{ $key }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ default $key $dep.name }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: {{ $key }}
    spec:
      containers:
        - name: {{ default $key $dep.name }}
          image: "{{ $dep.image.repository }}:{{ default $.Chart.AppVersion $dep.image.tag }}"          
          imagePullPolicy: IfNotPresent
          {{- with $dep.command }}
          command:
            {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with $dep.args }}
          args:
            {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- if $dep.containerPort }}
          ports:
            - name: http
              containerPort: {{ $dep.containerPort }}
              protocol: TCP
          {{- end }}
          {{- if and $dep.healthchecks $dep.healthchecks.enabled $dep.containerPort }}
          readinessProbe:
            httpGet:
              path: "/health"
              port: {{ $dep.containerPort }}
            initialDelaySeconds: {{ default 5 $dep.healthchecks.readiness.initialDelaySeconds }}
            periodSeconds: {{ default 10 $dep.healthchecks.readiness.periodSeconds }}
            timeoutSeconds: {{ default 3 $dep.healthchecks.readiness.timeoutSeconds }}
            failureThreshold: {{ default 3 $dep.healthchecks.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: "/health"
              port: {{ $dep.containerPort }}
            initialDelaySeconds: {{ default 15 $dep.healthchecks.liveness.initialDelaySeconds }}
            periodSeconds: {{ default 20 $dep.healthchecks.liveness.periodSeconds }}
            timeoutSeconds: {{ default 3 $dep.healthchecks.liveness.timeoutSeconds }}
            failureThreshold: {{ default 3 $dep.healthchecks.liveness.failureThreshold }}
          {{- end }}
          env:
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "promclick.clickhouseSecretName" $ }}
                  key: user
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "promclick.clickhouseSecretName" $ }}
                  key: password
          volumeMounts:
            - name: config
              mountPath: /app/{{ include "promclick.configFileName" (dict "dep" $dep) }}
              subPath: {{ include "promclick.configFileName" (dict "dep" $dep) }}
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "promclick.configMapName" (dict "key" $key "dep" $dep) }}
      {{- with $dep.nodeSelector }}
      nodeSelector:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with $dep.tolerations }}
      tolerations:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with $dep.affinity }}
      affinity:
        {{ toYaml . | nindent 8 }}
      {{- end }}
---
{{- end }}