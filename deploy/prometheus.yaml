global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

remote_write:
  - url: http://promclick-writer:9091/api/v1/write
    queue_config:
      max_samples_per_send: 10000
      batch_send_deadline: 5s
